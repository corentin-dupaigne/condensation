version: '3.8'

name: condensation

services:
  auth:
    build:
      context: ./authentication
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "8000:80"
    environment:
      - APP_NAME=Laravel
      - APP_ENV=local
      - APP_KEY=base64:9FmWeE2e3HkFtk58XQjWxwZkG/f2iK45Lq/GgqPqF+o=
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=auth_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - CLIENT_ID=ead85488-0ee1-41f9-9703-eac26103f5f4
      - CACHE_STORE=database
      - SESSION_DRIVER=database
      - QUEUE_CONNECTION=database
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    # We override the command to start the Next.js development server locally
    command: bun run dev
    ports:
      - "4000:3000"
    environment:
      - AUTH_URL=http://localhost:8000
      - API_URL=http://auth:80
      - CLIENT_ID=ead85488-0ee1-41f9-9703-eac26103f5f4
      - REDIRECT_URI=http://localhost:4000/api/auth/callback
      - NODE_ENV=development
    volumes:
      # We mount the source code for hot-reloading in dev
      - ./frontend:/app
      # We protect the inside container's node_modules from being overwritten by the host
      - /app/node_modules
    depends_on:
      - auth

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres-game:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: game_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d game_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_game_data:/var/lib/postgresql/data
      - ./scripts/V1__create_game_catalog_schema.sql:/docker-entrypoint-initdb.d/V1__create_game_catalog_schema.sql:ro
      - ./scripts/seed_games.sql:/docker-entrypoint-initdb.d/seed_games.sql:ro

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

volumes:
  postgres_data:
  postgres_game_data: