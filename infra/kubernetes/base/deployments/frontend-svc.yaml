apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: frontend-svc
  name: frontend-svc
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend-svc
  strategy: {}
  template:
    metadata:
      labels:
        app: frontend-svc
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - image: ghcr.io/corentin-dupaigne/fullstack_project/frontend
        name: condensation-frontend
        resources: {}
status: {}
