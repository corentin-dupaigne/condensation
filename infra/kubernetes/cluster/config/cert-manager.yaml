apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: corentin.dupaigne.productivity@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
    - http01:
        gatewayHTTPRoute:
          parentRefs:
          - name: gateway
            namespace: default
            kind: Gateway
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dev-condensation-cert
  namespace: default
spec:
  secretName: dev-condensation-tls
  dnsNames:
  - dev.condensation.corentindupaigne.com
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
