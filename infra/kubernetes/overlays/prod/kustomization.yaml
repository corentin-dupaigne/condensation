namespace: prod
resources:
  - namespace.yaml
  - http-route.yaml
  - ../../base
  - secrets/postgres-secret.yaml
  - secrets/postgres-game-secret.yaml
  - secrets/auth-secret.yaml
  - secrets/backend-secret.yaml
  - secrets/frontend-secret.yaml
  - configmaps/auth-cm.yaml
  - configmaps/frontend-cm.yaml
  - configmaps/backend-cm.yaml
  - configmaps/kafka-cm.yaml
# Image tags are set at deploy time by CI via `kubectl set image`.
# Do not apply this overlay manually without first running:
#   kustomize edit set image ghcr.io/corentin-dupaigne/fullstack_project/<service>:<version>
images:
  - name: ghcr.io/corentin-dupaigne/fullstack_project/auth
    newTag: set-by-ci
  - name: ghcr.io/corentin-dupaigne/fullstack_project/frontend
    newTag: set-by-ci
  - name: ghcr.io/corentin-dupaigne/fullstack_project/backend
    newTag: set-by-ci
  - name: ghcr.io/corentin-dupaigne/fullstack_project/postgres-game
    newTag: set-by-ci
