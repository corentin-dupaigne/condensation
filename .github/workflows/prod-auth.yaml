name: Prod — Build & Push Auth Image

on:
  push:
    tags:
      - "v*.*.*"   # Matches semver tags like v1.0.0, v2.3.1, etc.

jobs:
  build-auth-prod:
    name: Build auth image (prod)
    uses: ./.github/workflows/docker-build-template.yaml
    with:
      image-name: ghcr.io/${{ github.repository_owner }}/fullstack_project/auth
      image-tag: ${{ github.ref_name }}
      dockerfile-context: ./authentication
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tag-latest:
    name: Also tag as latest
    needs: build-auth-prod
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-tag as latest
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/fullstack_project/auth:${{ github.ref_name }}
          docker tag  ghcr.io/${{ github.repository_owner }}/fullstack_project/auth:${{ github.ref_name }} \
                      ghcr.io/${{ github.repository_owner }}/fullstack_project/auth:latest
          docker push ghcr.io/${{ github.repository_owner }}/fullstack_project/auth:latest
