name: _Docker Build & Push

on:
  workflow_call:
    inputs:
      image-name:
        description: "Full GHCR image name, e.g. ghcr.io/owner/repo/service"
        required: true
        type: string
      image-tag:
        description: "Primary tag to apply (e.g. dev, v1.0.0)"
        required: true
        type: string
      also-tag-latest:
        description: "Also push a :latest tag alongside the primary tag"
        required: false
        type: boolean
        default: false
      dockerfile-context:
        description: "Build context directory (e.g. ./authentication)"
        required: true
        type: string
      dockerfile-path:
        description: "Path to the Dockerfile relative to dockerfile-context"
        required: false
        type: string
        default: "Dockerfile"
      validate-tag:
        description: "Validate that image-tag matches semver format (v<major>.<minor>.<patch>)"
        required: false
        type: boolean
        default: false
    secrets:
      GHCR_TOKEN:
        description: "GitHub token with packages:write permission"
        required: true

jobs:
  build-push-scan:
    name: Build, push & scan ${{ inputs.image-name }}:${{ inputs.image-tag }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Validate tag format
        if: ${{ inputs.validate-tag }}
        run: |
          TAG="${{ inputs.image-tag }}"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid tag '$TAG'. Expected format: v<major>.<minor>.<patch> (e.g. v1.0.0)"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          TAGS="${{ inputs.image-name }}:${{ inputs.image-tag }}"
          if [ "${{ inputs.also-tag-latest }}" = "true" ]; then
            TAGS="$TAGS,${{ inputs.image-name }}:latest"
          fi
          echo "value=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.dockerfile-context }}
          file: ${{ inputs.dockerfile-context }}/${{ inputs.dockerfile-path }}
          push: true
          tags: ${{ steps.tags.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
