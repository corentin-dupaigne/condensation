name: CD Prod — Auth

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Tag to apply to the image (e.g. v1.0.0)"
        required: true

jobs:
  build-push-scan:
    name: Build, push & scan
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_docker-build.yaml
    with:
      image-name: ghcr.io/${{ github.repository_owner }}/fullstack_project/auth
      image-tag: ${{ inputs.image-tag || github.ref_name }}
      also-tag-latest: false
      validate-tag: true
      dockerfile-context: ./authentication
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build-push-scan
    uses: ./.github/workflows/_deploy.yaml
    with:
      deployment-name: auth-svc
      container-name: condensation-auth
      namespace: prod
      image: ghcr.io/${{ github.repository_owner }}/fullstack_project/auth:${{ inputs.image-tag || github.ref_name }}
    secrets:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_USER: ${{ secrets.VPS_USER }}
