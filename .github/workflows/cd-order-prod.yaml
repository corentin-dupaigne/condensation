name: CD Prod — Order Service

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Tag to apply to the image (defaults to the git tag)"
        required: false
        default: "test"

jobs:
  build-push-scan:
    name: Build, push & scan
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_docker-build.yaml
    with:
      image-name: ghcr.io/${{ github.repository_owner }}/fullstack_project/order
      image-tag: ${{ inputs.image-tag || github.ref_name }}
      also-tag-latest: true
      dockerfile-context: ./backend/order-service
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
