name: Docker Build & Push Template

on:
  workflow_call:
    inputs:
      image-name:
        description: "Full GHCR image name, e.g. ghcr.io/owner/repo/service"
        required: true
        type: string
      image-tag:
        description: "Tag to apply to the image (e.g. dev, latest, or a semver)"
        required: true
        type: string
      dockerfile-context:
        description: "Build context directory (e.g. ./authentication)"
        required: true
        type: string
      dockerfile-path:
        description: "Path to the Dockerfile relative to the repo root"
        required: false
        type: string
        default: "Dockerfile"
    secrets:
      GHCR_TOKEN:
        description: "GitHub token with packages:write permission"
        required: true

jobs:
  build-and-push:
    name: Build & Push ${{ inputs.image-name }}:${{ inputs.image-tag }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.dockerfile-context }}
          file: ${{ inputs.dockerfile-context }}/${{ inputs.dockerfile-path }}
          push: true
          tags: ${{ inputs.image-name }}:${{ inputs.image-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
