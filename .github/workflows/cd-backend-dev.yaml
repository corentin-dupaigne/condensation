name: CD Dev — Backend

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - "scripts/**"
  workflow_dispatch:

jobs:
  build-push-backend:
    name: Build & push backend
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_docker-build.yaml
    with:
      image-name: ghcr.io/${{ github.repository_owner }}/fullstack_project/backend
      image-tag: dev
      dockerfile-context: ./backend
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-push-postgres-game:
    name: Build & push postgres-game
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_docker-build.yaml
    with:
      image-name: ghcr.io/${{ github.repository_owner }}/fullstack_project/postgres-game
      image-tag: dev
      dockerfile-context: .
      dockerfile-path: infra/docker/postgres-game/Dockerfile
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-backend:
    needs: build-push-backend
    uses: ./.github/workflows/_deploy.yaml
    with:
      deployment-name: backend-svc
      namespace: dev
    secrets:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_USER: ${{ secrets.VPS_USER }}

  deploy-postgres-game:
    needs: build-push-postgres-game
    uses: ./.github/workflows/_deploy.yaml
    with:
      deployment-name: postgres-game
      namespace: dev
    secrets:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_USER: ${{ secrets.VPS_USER }}
