name: _Deploy to k3s

on:
  workflow_call:
    inputs:
      deployment-name:
        description: "Kubernetes deployment name (e.g. auth-svc)"
        required: true
        type: string
      namespace:
        description: "Kubernetes namespace (e.g. dev, prod)"
        required: true
        type: string
    secrets:
      VPS_HOST:
        description: "VPS SSH host"
        required: true
      VPS_SSH_KEY:
        description: "VPS SSH private key"
        required: true
      VPS_USER:
        description: "VPS SSH user"
        required: true

jobs:
  deploy:
    name: Deploy ${{ inputs.deployment-name }} to ${{ inputs.namespace }}
    runs-on: ubuntu-latest

    steps:
      - name: Restart deployment via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            kubectl rollout restart deployment/${{ inputs.deployment-name }} -n ${{ inputs.namespace }}
            kubectl rollout status deployment/${{ inputs.deployment-name }} -n ${{ inputs.namespace }} --timeout=120s
