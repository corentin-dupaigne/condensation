name: CD Prod — Backend

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Tag to apply to the image (e.g. v1.0.0)"
        required: true

jobs:
  retag-backend:
    name: Retag backend dev → ${{ inputs.image-tag || github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Validate tag format
        run: |
          TAG="${{ inputs.image-tag || github.ref_name }}"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid tag '$TAG'. Expected format: v<major>.<minor>.<patch> (e.g. v1.0.0)"
            exit 1
          fi
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Retag dev image
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository_owner }}/fullstack_project/backend:${{ inputs.image-tag || github.ref_name }} \
            ghcr.io/${{ github.repository_owner }}/fullstack_project/backend:dev

  retag-postgres-game:
    name: Retag postgres-game dev → ${{ inputs.image-tag || github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Validate tag format
        run: |
          TAG="${{ inputs.image-tag || github.ref_name }}"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid tag '$TAG'. Expected format: v<major>.<minor>.<patch> (e.g. v1.0.0)"
            exit 1
          fi
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Retag dev image
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository_owner }}/fullstack_project/postgres-game:${{ inputs.image-tag || github.ref_name }} \
            ghcr.io/${{ github.repository_owner }}/fullstack_project/postgres-game:dev

  deploy-backend:
    needs: build-push-backend
    uses: ./.github/workflows/_deploy.yaml
    with:
      deployment-name: backend-svc
      container-name: condensation-backend
      namespace: prod
      image: ghcr.io/${{ github.repository_owner }}/fullstack_project/backend:${{ inputs.image-tag || github.ref_name }}
    secrets:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_USER: ${{ secrets.VPS_USER }}

  deploy-postgres-game:
    needs: build-push-postgres-game
    uses: ./.github/workflows/_deploy.yaml
    with:
      deployment-name: postgres-game
      container-name: postgres-game
      namespace: prod
      image: ghcr.io/${{ github.repository_owner }}/fullstack_project/postgres-game:${{ inputs.image-tag || github.ref_name }}
    secrets:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_USER: ${{ secrets.VPS_USER }}
